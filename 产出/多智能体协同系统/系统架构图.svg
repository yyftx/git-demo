  <rect x="70" y="360" width="210" height="90" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="2"/>
  <text x="175" y="385" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">🧠 A1 课程规划</text>
  <text x="175" y="405" fill="#94a3b8" font-size="8" text-anchor="middle">知识图谱构建</text>
