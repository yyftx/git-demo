  <rect x="30" y="200" width="1240" height="110" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="12,4"/>
  <text x="48" y="222" fill="#fbbf24" font-size="10" font-weight="700">接入网关层</text>

  <!-- API Gateway -->
  <rect x="80" y="235" width="280" height="55" rx="6" fill="#0f172a"/>
  <rect x="80" y="235" width="280" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="220" y="258" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">API Gateway</text>
  <text x="220" y="276" fill="#94a3b8" font-size="8" text-anchor="middle">Kong / Nginx · 路由 · 限流 · 鉴权</text>

  <!-- 身份认证 -->
  <rect x="420" y="235" width="220" height="55" rx="6" fill="#0f172a"/>
  <rect x="420" y="235" width="220" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="530" y="258" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">🔐 身份认证服务</text>
  <text x="530" y="276" fill="#94a3b8" font-size="8" text-anchor="middle">OAuth 2.0 · JWT · SSO</text>

  <!-- 权限管理 -->
  <rect x="700" y="235" width="220" height="55" rx="6" fill="#0f172a"/>
  <rect x="700" y="235" width="220" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="810" y="258" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">🛡️ 权限管理</text>
  <text x="810" y="276" fill="#94a3b8" font-size="8" text-anchor="middle">RBAC · 教师/学生/家长角色</text>

  <!-- Load Balancer -->
  <rect x="980" y="235" width="260" height="55" rx="6" fill="#0f172a"/>
  <rect x="980" y="235" width="260" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1110" y="258" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">⚖️ 负载均衡</text>
  <text x="1110" y="276" fill="#94a3b8" font-size="8" text-anchor="middle">Nginx · 健康检查 · 灰度发布</text>

