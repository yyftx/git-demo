    <rect x="0" y="10" width="200" height="60" rx="2" fill="#0f172a"/>
    <ellipse cx="100" cy="10" rx="100" ry="14" fill="#0f172a"/>
    <ellipse cx="100" cy="70" rx="100" ry="14" fill="#0f172a"/>
    <rect x="0" y="10" width="200" height="60" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="100" cy="10" rx="100" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="100" cy="70" rx="100" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="70" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="200" y1="10" x2="200" y2="70" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="100" y="47" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">PostgreSQL 学生模型</text>
