  <!-- Connections from agents to bus -->
  <line x1="175" y1="455" x2="175" y2="468" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <line x1="415" y1="455" x2="415" y2="468" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>
  <line x1="655" y1="455" x2="655" y2="468" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="895" y1="455" x2="895" y2="468" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow-violet)"/>
  <line x1="1135" y1="455" x2="1135" y2="468" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow-violet)"/>

  <!-- Agent Collaboration Labels -->
  <text x="650" y="540" fill="#94a3b8" font-size="9" text-anchor="middle">协同关系：A1 ⇄ A2（教学计划同步）│ A2 → A3（实时批改调用）│ A3 → A4（诊断数据推送）</text>
  <text x="650" y="558" fill="#94a3b8" font-size="9" text-anchor="middle">A4 ⇄ A1（闭环反馈）│ A1~A4 → A5（评价数据汇聚）│ A5 → A1（周期优化起点）</text>

