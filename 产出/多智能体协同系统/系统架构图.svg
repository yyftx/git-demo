  <line x1="180" y1="175" x2="220" y2="232" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="175" x2="440" y2="232" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="175" x2="700" y2="232" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="960" y1="175" x2="960" y2="232" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

