<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1050">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="650" y="34" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">智慧教室 — 多智能体协同系统架构图</text>
  <text x="650" y="53" fill="#94a3b8" font-size="9" text-anchor="middle">五层架构：用户层 → 接入网关 → 智能体引擎 → 数据层 → 基础设施层</text>

  <!-- ============================================ -->
  <!-- LAYER 1: 用户层 (y=70 to 180) -->
  <!-- ============================================ -->
  <rect x="30" y="70" width="1240" height="120" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="12,4"/>
  <text x="48" y="92" fill="#22d3ee" font-size="10" font-weight="700">用户层</text>

  <!-- 教师端 -->
  <rect x="80" y="105" width="200" height="65" rx="6" fill="#0f172a"/>
  <rect x="80" y="105" width="200" height="65" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="2"/>
  <text x="180" y="132" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">👨‍🏫 教师端</text>
  <text x="180" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">Web 管理后台</text>
  <text x="180" y="163" fill="#64748b" font-size="7" text-anchor="middle">备课 · 授课 · 看报告</text>

  <!-- 学生端 -->
  <rect x="340" y="105" width="200" height="65" rx="6" fill="#0f172a"/>
  <rect x="340" y="105" width="200" height="65" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="2"/>
  <text x="440" y="132" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">🎒 学生端</text>
  <text x="440" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">微信小程序 / App</text>
  <text x="440" y="163" fill="#64748b" font-size="7" text-anchor="middle">上课 · 交作业 · 看诊断</text>

  <!-- 家长端 -->
  <rect x="600" y="105" width="200" height="65" rx="6" fill="#0f172a"/>
  <rect x="600" y="105" width="200" height="65" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="2"/>
  <text x="700" y="132" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">👨‍👩‍👧 家长端</text>
  <text x="700" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">微信小程序</text>
  <text x="700" y="163" fill="#64748b" font-size="7" text-anchor="middle">查看报告 · 家校沟通</text>

  <!-- 管理员端 -->
  <rect x="860" y="105" width="200" height="65" rx="6" fill="#0f172a"/>
  <rect x="860" y="105" width="200" height="65" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="2"/>
  <text x="960" y="132" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">⚙️ 管理员端</text>
  <text x="960" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">Web 管理后台</text>
  <text x="960" y="163" fill="#64748b" font-size="7" text-anchor="middle">系统配置 · 数据管理</text>

