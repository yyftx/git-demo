  <text x="895" y="405" fill="#94a3b8" font-size="8" text-anchor="middle">DKT 知识追踪</text>
  <text x="895" y="420" fill="#94a3b8" font-size="8" text-anchor="middle">薄弱点热力图</text>
  <text x="895" y="435" fill="#94a3b8" font-size="8" text-anchor="middle">遗忘曲线预测</text>

  <!-- Agent 5: A5 -->
  <rect x="1030" y="360" width="210" height="90" rx="6" fill="#0f172a"/>
  <rect x="1030" y="360" width="210" height="90" rx="6" fill="rgba(76,29,149,0.7)" stroke="#a78bfa" stroke-width="3"/>
  <text x="1135" y="385" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">📊 A5 综合评价</text>
  <text x="1135" y="405" fill="#94a3b8" font-size="8" text-anchor="middle">多维度数据融合</text>
  <text x="1135" y="420" fill="#94a3b8" font-size="8" text-anchor="middle">学生画像生成</text>
  <text x="1135" y="435" fill="#94a3b8" font-size="8" text-anchor="middle">趋势预测 + 预警</text>

